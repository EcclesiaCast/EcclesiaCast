name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versión a publicar (ej. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $env:GITHUB_REF -replace '^refs/tags/v', ''
          } else {
            '${{ github.event.inputs.version }}'
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test
        run: dotnet test --configuration Release

      - name: Publish (self-contained x64)
        run: >
          dotnet publish src/EcclesiaCast.App/EcclesiaCast.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:Version=${{ steps.version.outputs.version }}
          --output publish

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.version.outputs.version }} installer\EcclesiaCast.iss

      - uses: actions/upload-artifact@v4
        with:
          name: EcclesiaCast-installer
          path: dist/*.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          # A version with a suffix (v1.0.0-beta.1, -rc.2...) is a pre-release,
          # so it doesn't get announced as the latest stable download.
          prerelease: ${{ contains(github.ref_name, '-') }}
